<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Projekt-Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --surface3: #22223a;
    --border: #2a2a42;
    --gold: #C6A962;
    --gold-dim: #9a8345;
    --gold-glow: rgba(198,169,98,0.15);
    --text: #e8e4dc;
    --text-dim: #8888a0;
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.15);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.15);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.15);
    --orange: #fbbf24;
    --orange-dim: rgba(251,191,36,0.15);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.15);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 0 24px 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sidebar-logo h1 {
    font-size: 18px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: -0.5px;
  }
  .sidebar-logo span {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: block;
    margin-top: 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: var(--gold-glow);
    color: var(--gold);
    border-left-color: var(--gold);
  }
  .nav-icon { font-size: 18px; width: 24px; text-align: center; }
  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    padding: 20px 24px 8px;
    font-weight: 600;
  }
  .sidebar-footer {
    margin-top: auto;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .sidebar-footer p {
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Main */
  .main { margin-left: 260px; flex: 1; padding: 32px; min-height: 100vh; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 32px;
  }
  .page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .page-subtitle { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  /* Cards */
  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-2 { grid-template-columns: repeat(2, 1fr); }
  .grid-1-2 { grid-template-columns: 1fr 2fr; }
  .grid-2-1 { grid-template-columns: 2fr 1fr; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s;
  }
  .card:hover { border-color: var(--gold-dim); }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .card-icon { font-size: 20px; }

  /* KPI Cards */
  .kpi-value {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  .kpi-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .kpi-change {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 8px;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .kpi-change.up { color: var(--green); background: var(--green-dim); }
  .kpi-change.info { color: var(--blue); background: var(--blue-dim); }

  /* Phase Cards */
  .phase-card {
    position: relative;
    overflow: hidden;
  }
  .phase-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
  }
  .phase-card.done::before { background: var(--green); }
  .phase-card.active::before { background: var(--gold); }
  .phase-card.pending::before { background: var(--border); }

  .phase-number {
    font-size: 48px;
    font-weight: 900;
    color: var(--surface3);
    position: absolute;
    right: 16px;
    top: 8px;
    line-height: 1;
  }
  .phase-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .phase-status.done { color: var(--green); background: var(--green-dim); }
  .phase-status.active { color: var(--gold); background: var(--gold-glow); }
  .phase-status.pending { color: var(--text-dim); background: var(--surface3); }
  .phase-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .phase-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-green { color: var(--green); background: var(--green-dim); }
  .tag-red { color: var(--red); background: var(--red-dim); }
  .tag-orange { color: var(--orange); background: var(--orange-dim); }
  .tag-blue { color: var(--blue); background: var(--blue-dim); }
  .tag-purple { color: var(--purple); background: var(--purple-dim); }
  .tag-gold { color: var(--gold); background: var(--gold-glow); }

  /* Progress Bar */
  .progress-bar {
    height: 6px;
    background: var(--surface3);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 1s ease;
  }

  /* USP List */
  .usp-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .usp-item:last-child { border-bottom: none; }
  .usp-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--gold-glow);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .usp-text { font-size: 13px; font-weight: 600; }
  .usp-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* Tier Cards */
  .tier-card { text-align: center; position: relative; }
  .tier-card.recommended { border-color: var(--gold); }
  .tier-card.recommended::after {
    content: 'EMPFOHLEN';
    position: absolute;
    top: -1px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 12px;
    border-radius: 0 0 6px 6px;
    letter-spacing: 1px;
  }
  .tier-name {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .tier-price { font-size: 36px; font-weight: 800; color: var(--gold); }
  .tier-period { font-size: 12px; color: var(--text-dim); }
  .tier-features { list-style: none; margin-top: 16px; text-align: left; }
  .tier-features li {
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tier-features li:last-child { border-bottom: none; }
  .check { color: var(--green); }
  .cross { color: var(--text-dim); opacity: 0.3; }

  /* Donut chart */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut { position: relative; width: 120px; height: 120px; }
  .donut svg { transform: rotate(-90deg); }
  .donut-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .donut-val { font-size: 20px; font-weight: 800; }
  .donut-label { font-size: 10px; color: var(--text-dim); }
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Bar chart */
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .bar-label { font-size: 12px; width: 80px; text-align: right; color: var(--text-dim); flex-shrink: 0; }
  .bar-track { flex: 1; height: 24px; background: var(--surface3); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; transition: width 1s ease; }
  .bar-value { font-size: 12px; font-weight: 700; width: 80px; flex-shrink: 0; }

  /* Timeline */
  .timeline-item {
    display: flex;
    gap: 16px;
    padding-bottom: 20px;
    position: relative;
  }
  .timeline-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 15px;
    top: 36px;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .timeline-content { flex: 1; }
  .timeline-title { font-size: 14px; font-weight: 600; }
  .timeline-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .timeline-tasks {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .timeline-task {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--surface3);
    border-radius: 4px;
    color: var(--text-dim);
  }

  /* Risk meter */
  .risk-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .risk-row:last-child { border-bottom: none; }
  .risk-meter {
    width: 60px;
    height: 8px;
    background: var(--surface3);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .risk-fill { height: 100%; border-radius: 4px; }
  .risk-label { font-size: 12px; font-weight: 600; flex: 1; }
  .risk-pct { font-size: 12px; font-weight: 700; width: 40px; text-align: right; flex-shrink: 0; }

  /* Skill Cards */
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .skill-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
  .skill-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--gold);
  }
  .skill-card.dev::before { background: var(--blue); }
  .skill-icon { font-size: 32px; margin-bottom: 12px; }
  .skill-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; font-family: monospace; color: var(--gold); }
  .skill-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
  .skill-meta { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Activity timeline mini */
  .activity-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-date {
    font-size: 11px;
    color: var(--gold);
    font-weight: 700;
    width: 50px;
    flex-shrink: 0;
  }
  .activity-text { font-size: 13px; color: var(--text); }

  .section-gap { margin-top: 24px; }

  @media (max-width: 1200px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .grid-1-2, .grid-2-1 { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 16px; }
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  }
</style>
</head>

// ── Donut Component ──
function Donut({ segments, centerVal, centerLabel }) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  let offset = 0;
  const r = 50, c = 2 * Math.PI * r;
  return (
    <div className="donut-wrap">
      <div className="donut">
        <svg width="120" height="120" viewBox="0 0 120 120">
          {segments.map((seg, i) => {
            const dash = (seg.value / total) * c;
            const gap = c - dash;
            const o = offset;
            offset += dash;
            return <circle key={i} cx="60" cy="60" r={r} fill="none" stroke={seg.color} strokeWidth="12" strokeDasharray={`${dash} ${gap}`} strokeDashoffset={-o} />;
          })}
        </svg>
        <div className="donut-center">
          <div className="donut-val">{centerVal}</div>
          <div className="donut-label">{centerLabel}</div>
        </div>
      </div>
      <div className="legend">
        {segments.map((seg, i) => (
          <div key={i} className="legend-item">
            <div className="legend-dot" style={{ background: seg.color }}></div>
            <span>{seg.label}: <strong>{seg.value}%</strong></span>
          </div>
        ))}
      </div>
    </div>
  );
}

            measures: ['DACH-Expansion (ImmoScout24.de, willhaben.at)', 'Upsell-Strategie: Mehr Revenue pro Kunde', 'Angrenzende Verticals: Verwaltungen, Bauträger', 'CHF 5M ARR = exzellentes Lifestyle-Business'] },
        ].map((r, i) => (
          <div key={i} className="card">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
              <span className="tag" style={{ background: r.color + '22', color: r.color }}>{r.pct}%</span>
              <span style={{ fontSize: 14, fontWeight: 700 }}>{r.title}</span>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {r.measures.map((m, j) => (
                <div key={j} style={{ fontSize: 12, padding: '6px 12px', background: 'var(--surface2)', borderRadius: 6, color: 'var(--text-dim)' }}>✓ {m}</div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </>
  );
}

// ── APP ──
function App() {
  const [page, setPage] = useState('overview');

  const renderPage = () => {
    switch(page) {
      case 'overview': return <OverviewPage />;
      case 'reporting': return <ReportingPage />;
      case 'skills': return <SkillsPage />;
      case 'market': return <MarketPage />;
      case 'product': return <ProductPage />;
      case 'pricing': return <PricingPage />;
      case 'roadmap': return <RoadmapPage />;
      case 'tech': return <TechPage />;
      case 'risks': return <RisksPage />;
      default: return <OverviewPage />;
    }
  };

  return (
    <div className="app">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <h1>AutoRespond</h1>
          <span>SaaS Projekt</span>
        </div>
        <div className="nav-section">Dashboard</div>
        {pages.map(p => (
          <div key={p.id} className={`nav-item ${page === p.id ? 'active' : ''}`} onClick={() => setPage(p.id)}>
            <span className="nav-icon">{p.icon}</span>
            {p.label}
          </div>
        ))}
        <div className="nav-section">Dokumente</div>
        <a href="01-Research/Marktanalyse.md" className="nav-item" style={{ textDecoration: 'none' }}>
          <span className="nav-icon">📄</span>Marktanalyse
        </a>
        <a href="01-Research/Business-Strategie.md" className="nav-item" style={{ textDecoration: 'none' }}>
          <span className="nav-icon">📄</span>Business-Strategie
        </a>
        <a href="02-Produkt/Produktkonzept.md" className="nav-item" style={{ textDecoration: 'none' }}>
          <span className="nav-icon">📄</span>Produktkonzept
        </a>
        <div className="sidebar-footer">
          <p>Stand: 16. März 2026</p>
          <p style={{ marginTop: 4, color: 'var(--gold)' }}>Phase 3 — Branding</p>
        </div>
      </nav>
      <main className="main">
        {renderPage()}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
